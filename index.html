<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Ahmed | Visual Artist Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-color: #c8a96e; /* Artistic Gold */
            --text-color: #ffffff;
            --secondary-text: #bbbbbb;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .art-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        .art-title {
            font-size: 2.2rem;
            color: var(--accent-color);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .artist-name {
            font-size: 1.1rem;
            color: var(--secondary-text);
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .price-tag {
            font-size: 1.8rem;
            color: #2ecc71;
            margin: 20px 0;
            font-weight: bold;
            border: 1px solid #2ecc71;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
        }
        .description {
            color: var(--secondary-text);
            line-height: 1.8;
            margin: 25px 0;
            font-style: italic;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .btn-insta {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
        }
        .btn-whatsapp {
            background-color: #25d366;
            color: white;
        }
        .btn:hover {
            transform: translateY(-4px);
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="art-card">
        <h1 class="art-title">"The Night City"</h1>
        <div class="artist-name">Original Artwork by Daniel Ahmed</div>
        
        <div class="price-tag">$700</div>
        
        <div class="description">
            A surrealist exploration of urban depth and nocturnal mysteries. This original piece is now available for collectors worldwide. Signed by the artist.
        </div>

        <div class="links-container">
            <a href="https://www.instagram.com/daniel_art4" target="_blank" class="btn btn-insta">
                Follow me on Instagram
            </a>

            <a href="https://wa.me/213669486120" target="_blank" class="btn btn-whatsapp">
                Inquire via WhatsApp
            </a>
        </div>
    </div>

</body>
</html>
