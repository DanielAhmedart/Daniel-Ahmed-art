<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Ahmed | Visual Artist</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c8a96e; --dark: #0a0a0a; --bg: #faf8f4; }
        body { margin: 0; background: var(--bg); font-family: 'Jost', sans-serif; color: var(--dark); }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 2rem 5%; background: rgba(250, 248, 244, 0.95); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 2rem; letter-spacing: 2px; }
        .nav-links a { margin-left: 20px; text-decoration: none; color: var(--dark); font-size: 0.9rem; text-transform: uppercase; }

        /* Hero Section */
        .hero { text-align: center; padding: 10rem 5% 5rem; background: #f5f0e8; }
        .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 10vw, 5rem); font-weight: 400; margin-bottom: 2rem; }
        .hero p { max-width: 600px; margin: 0 auto 3rem; color: #666; font-size: 1.2rem; line-height: 1.8; }
        .price { font-size: 2.5rem; color: var(--gold); margin-bottom: 3rem; font-weight: 300; }

        /* Button */
        .btn { display: inline-block; padding: 1.2rem 3.5rem; background: var(--dark); color: #fff; text-decoration: none; letter-spacing: 2px; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { background: var(--gold); transform: translateY(-3px); }

        /* Gallery Placeholder */
        .gallery { padding: 5rem 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .art-item { border: 1px solid #eee; padding: 15px; background: #fff; text-align: center; }
        .art-img { width: 100%; aspect-ratio: 1/1; background: #eee; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; color: #aaa; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">DANIEL AHMED</div>
        <div class="nav-links">
            <a href="#gallery">Gallery</a>
            <a href="https://www.instagram.com/daniel_art4">Instagram</a>
            <a href="https://wa.me/213669486120">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Art that touches the soul</h1>
        <p>Surrealism meets identity and memory — original paintings that explore the deep questions of humanity.</p>
        <div class="price">$700.00</div>
        <a href="https://wa.me/213669486120" class="btn">Inquire via WhatsApp</a>
    </section>

    <div id="gallery" class="gallery">
        <div class="art-item">
            <div class="art-img">Featured Work</div>
            <h3 style="font-family:'Cormorant Garamond', serif; font-size: 1.5rem;">The Night City</h3>
            <p style="color:var(--gold)">$700.00</p>
        </div>
    </div>

</body>
</html>
